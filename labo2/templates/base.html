<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MVC labo2{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="nav">
  {% if session.get('username') %}
    <a href="{{ url_for('main.index') }}">Inicio</a>
    <a href="{{ url_for('profesores.list_') }}">Profesores</a>
    <a href="{{ url_for('alumnos.list_') }}">Alumnos</a>
    <a href="{{ url_for('cursos.list_') }}">Cursos</a>
    <a href="{{ url_for('matriculas.list_') }}">Matrículas</a>
    <form method="post" action="{{ url_for('auth.logout') }}" class="nav-logout">
      <button type="submit">Cerrar sesión</button>
    </form>
  {% else %}
    <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
  {% endif %}
</nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
