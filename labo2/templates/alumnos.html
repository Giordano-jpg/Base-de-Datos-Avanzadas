{% extends "base.html" %}
{% block title %}Alumnos — MVC labo2{% endblock %}
{% block content %}
  <h1>Alumnos</h1>
  <ul class="list">
    {% for alumno in alumnos %}
    <li>{{ alumno.id }} — {{ alumno.nombre }} — {{ alumno.email }}</li>
    {% else %}
    <li class="empty">No hay alumnos.</li>
    {% endfor %}
  </ul>
{% endblock %}
